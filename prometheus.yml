global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3000']
    authorization:
      type: Bearer
      credentials_file: "/etc/prometheus/token.txt"
  
  - job_name: 'mongodb'
    scrape_interval: 30s
    scrape_timeout: 30s
    static_configs:
      - targets: ['database-exporter:9001']

  
  - job_name: 'redis'
    static_configs:
      - targets: ['cashe-exporter:9121']