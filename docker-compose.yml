services:
  prometheus:
    image: prom/prometheus:main-distroless
    container_name: prometheus_container
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./backend/token.txt:/etc/prometheus/token.txt
      - prometheus_data:/prometheus
    command: 
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=10d'
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - monitoring
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter_container
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_container
    env_file:
      - .env
    ports:
      - "3333:3000"
    volumes:
      - grafana_storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
    networks:
      - monitoring
  database:
    image: mongo:7.0
    container_name: mongodb_container
    ports:
      - "27017:27017"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - monitoring
  database-exporter:
    image: amazonaws/mongodb_exporter
    ports:
      - "9001:9001"
    env_file:
      - backend/.env
    networks:
      - monitoring
    depends_on:
      - database
  cashe:
    image: redis:alpine
    container_name: redis-container
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --save 60 1000
    mem_limit: 300m
    networks:
      - monitoring
  cashe-exporter:
    image: cleanstart/redis-exporter:1.82.0-amd64
    ports:
      - "9121:9121"
    env_file:
      - backend/.env
    networks:
      - monitoring
  api:
    build: 
      context: ./backend
      target: development
    environment:
      - NODE_OPTIONS=--max-old-space-size=350
    hostname: api
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    expose:
      - "3000"
    dns:
      - 1.1.1.3
    depends_on:
      - database
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 400M

  web:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173" 
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 400M
    networks:
      - monitoring
networks:
  monitoring:
    driver: bridge


volumes:
  prometheus_data:
  grafana_storage: